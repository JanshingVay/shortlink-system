version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: shortlink-mysql
    restart: always # 崩溃后自动重启，保证高可用
    environment:
      MYSQL_ROOT_PASSWORD: 123456 # 对应 Go 代码里的密码
      MYSQL_DATABASE: shortlink   # 也可以通过这里直接建库
      TZ: Asia/Shanghai           # 设置时区，避免时间戳错乱
    ports:
      - "3307:3306" # 映射到宿主机，方便本地调试 Go 代码
    volumes:
      - mysql_data:/var/lib/mysql # 数据持久化：即使容器删了，数据还在！
      - ../scripts/init.sql:/docker-entrypoint-initdb.d/init.sql # 挂载初始化脚本
    command: 
      --character-set-server=utf8mb4 
      --collation-server=utf8mb4_unicode_ci 
      --max_connections=1000 # 配合你 Go 代码里的高并发测试调大连接数限制

  redis:
    image: redis:7.0-alpine # 使用 alpine 版本，镜像体积极小，启动极快
    container_name: shortlink-redis
    restart: always
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes # 开启 AOF 持久化，防止断电导致缓存全丢（面试高频考点）

  # 路径: deployments/docker-compose.yml (追加到最后)

  prometheus:
    image: prom/prometheus:latest
    container_name: shortlink-prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    # 让容器能通过 host.docker.internal 访问宿主机的 Go 服务
    extra_hosts:
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana:latest
    container_name: shortlink-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin # 默认密码设为 admin
    depends_on:
      - prometheus

# 定义命名数据卷，交由 Docker 引擎管理
volumes:
  mysql_data:
  redis_data: